<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmDirect - Fresh Farm Produce Delivered</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/socket.io/socket.io.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <header>
    <nav>
      <div class="logo" onclick="window.location.href='index.html'">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
        Farm<span>Direct</span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="#" id="dashboard-link" style="display: none;">Dashboard</a></li>
        <li class="user-only"><a href="user-dashboard.html">My Orders</a></li>
        <li class="admin-only"><a href="admin-dashboard.html">Manage</a></li>
        <li class="delivery-only"><a href="delivery-dashboard.html">Deliveries</a></li>
      </ul>
      <div class="auth-buttons">
        <div id="auth-controls"></div>
        <a href="cart.html" class="cart-icon-container">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
          Cart
          <span class="cart-badge" id="cart-badge-count">0</span>
        </a>
      </div>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <div class="hero-content">
        <h1>Fresh Groceries <br><span>Delivered in Minutes.</span></h1>
        <p>Your favorite brands, fresh produce, and daily essentials brought right to your door with zero hassle.</p>
        <button class="btn btn-primary" style="font-size: 1.1rem; padding: 0.8rem 2rem;" onclick="document.getElementById('categories').scrollIntoView({behavior: 'smooth'})">Shop Now</button>
      </div>
      <img src="https://images.unsplash.com/photo-1542838132-92c53300491e?w=800&q=80" alt="Fresh Delivery" class="hero-image" style="border-radius: 20px;">
    </section>

    <section id="categories" class="mb-2">
      <div class="section-header">
        <h2>Shop by Category</h2>
      </div>
      <div class="category-scroll" id="category-scroller">
        <!-- Loaded via JS -->
      </div>
    </section>

    <section>
      <div class="section-header">
        <h2>Featured Products</h2>
      </div>
      <div class="grocery-grid" id="grocery-grid">
        <!-- Loaded via JS -->
      </div>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Load Categories
      apiFetch('/user/categories').then(categories => {
        const catScroller = document.getElementById('category-scroller');
        const defaultImages = {
          'Exotic Fruits & Veggies': 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=300&q=80',
          'Tea': 'https://images.unsplash.com/photo-1544787210-221a6d4fd3bc?w=300&q=80',
          'Ghee & Vanaspati': 'https://images.unsplash.com/photo-1678810795493-2947190ced85?w=300&q=80',
          'Fruits': 'https://images.unsplash.com/photo-1610832958506-aa56368176cf?w=300&q=80',
          'Vegetables': 'https://images.unsplash.com/photo-1597362925123-77861d3fbac7?w=300&q=80',
          'Dairy': 'https://images.unsplash.com/photo-1628088062854-d1870b4553da?w=300&q=80',
          'Bakery': 'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=300&q=80',
          'Beverages': 'https://images.unsplash.com/photo-1544145945-f90425340c7e?w=300&q=80',
          'Snacks': 'https://images.unsplash.com/photo-1599490659213-e2b9527bd087?w=300&q=80',
          'Meat & Seafood': 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=300&q=80',
        };
        catScroller.innerHTML = categories.map(c => {
          const imageUrl = c.imageUrl || defaultImages[c.name] || 'https://images.unsplash.com/photo-1542838132-92c53300491e?w=300&q=80';
          return `
          <div class="category-card" onclick="window.location.href='category.html?id=${c.id}&name=${encodeURIComponent(c.name)}'">
            <img src="${imageUrl}" alt="${c.name}">
            <h3>${c.name}</h3>
          </div>
        `;
        }).join('');
      });

      // Load Featured Groceries (Random or first 8)
      apiFetch('/user/groceries').then(groceries => {
        const grid = document.getElementById('grocery-grid');
        // slice to first 8 for home page
        grid.innerHTML = groceries.slice(0, 8).map(g => window.createProductCard(g)).join('');
      });
    });
  </script>
</body>
</html>
