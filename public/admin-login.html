<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - FarmDirect</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #f8fafc;
    }
    .auth-container {
      background: #1e293b;
      border: 1px solid #334155;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .auth-container h2 {
      color: #f8fafc;
    }
    .auth-container p {
      color: #94a3b8;
    }
    .logo {
      color: #f8fafc;
    }
    .logo span {
      color: #38bdf8;
    }
    .form-control {
      background: #334155;
      border-color: #475569;
      color: #f8fafc;
    }
    .form-control:focus {
      border-color: #38bdf8;
      background: #334155;
    }
    .btn-primary {
      background: #0284c7;
      border: none;
    }
    .btn-primary:hover {
      background: #0369a1;
    }
    .auth-switch {
      color: #94a3b8;
    }
    .auth-switch a {
      color: #38bdf8;
    }
  </style>
</head>
<body>
  
  <div class="auth-container">
    <div class="logo" onclick="window.location.href='index.html'" style="justify-content: center; margin-bottom: 2rem;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
      Farm<span>Direct</span> Admin
    </div>
    
    <h2>Admin Portal</h2>
    <p>Sign in to manage your grocery ecosystem.</p>
    
    <form id="loginForm">
      <div class="form-group">
        <label>Admin Email</label>
        <input type="email" id="email" class="form-control" placeholder="admin@farmdirect.com" required>
      </div>
      <div class="form-group mb-2">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">Secure Sign In</button>
    </form>
    
    <div class="auth-switch">
      Not an admin? <a href="login.html">Personal Login</a>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        try {
          const data = await apiFetch('/auth/login', {
            method: 'POST',
            body: JSON.stringify({email, password, requiredRole: 'admin'})
          });
          
          if (data && data.token) {
            saveAuth(data, data.user);
            window.location.href = 'admin-dashboard.html';
          } else {
            alert('Login Failed: ' + (data.error || 'Invalid credentials'));
          }
        } catch (err) {
          console.error(err);
          alert('Network Error: Failed to connect to the server.');
        }
      });
    });
  </script>
</body>
</html>
