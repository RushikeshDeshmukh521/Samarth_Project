<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FarmDirect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background: linear-gradient(135deg, var(--primary-light) 0%, #ffffff 100%); align-items: center; justify-content: center; min-height: 100vh;">
  
  <div class="auth-container">
    <div class="logo" onclick="window.location.href='index.html'" style="justify-content: center; margin-bottom: 2rem;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
      Farm<span>Direct</span>
    </div>
    
    <h2>Welcome Back!</h2>
    <p>Sign in to continue your fresh journey.</p>
    
    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group mb-2">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">Sign In</button>
    </form>
    
    <div class="auth-switch">
      Don't have an account? <a href="#" onclick="window.location.href='register.html' + window.location.search">Store Signup</a>
      <br><br>
      <a href="admin-login.html" style="font-size: 0.8rem; opacity: 0.7;">Admin Login</a>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        try {
          const data = await apiFetch('/auth/login', {
            method: 'POST',
            body: JSON.stringify({email, password, requiredRole: 'user'})
          });
          
          if (data && data.token) {
            saveAuth(data, data.user);
            
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect');
            
            if (redirect) {
              window.location.href = redirect;
            } else {
              window.location.href = getDashboardUrl();
            }
          } else {
            alert('Login Failed: ' + (data.error || 'Invalid credentials'));
          }
        } catch (err) {
          console.error(err);
          alert('Network Error: Failed to connect to the server. Please ensure the server is running.');
        }
      });
    });
  </script>
</body>
</html>
