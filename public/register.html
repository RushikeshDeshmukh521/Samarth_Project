<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - FarmDirect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background: linear-gradient(135deg, var(--primary-light) 0%, #ffffff 100%); align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 0;">
  
  <div class="auth-container" style="max-width: 550px; margin: 0 auto;">
    <div class="logo" onclick="window.location.href='index.html'" style="justify-content: center; margin-bottom: 2rem;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
      Farm<span>Direct</span>
    </div>
    
    <h2>Create Account</h2>
    <p>Join millions of customers receiving fresh groceries.</p>
    
    <form id="registerForm">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; text-align: left;">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="phone" class="form-control" required>
        </div>
      </div>
      
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" class="form-control" required>
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>

      <div class="form-group mb-2">
        <label>Delivery Address</label>
        <textarea id="address" class="form-control" rows="2" placeholder="Street, City, Zip" required></textarea>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">Sign Up</button>
    </form>
    
    <div class="auth-switch">
      Already have an account? <a href="#" onclick="window.location.href='login.html' + window.location.search">Sign In</a>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = e.target.querySelector('button[type="submit"]');
        submitBtn.textContent = 'Creating Account...';
        submitBtn.disabled = true;

        const payload = {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          phone: document.getElementById('phone').value,
          address: { full: document.getElementById('address').value },
          role: 'user'
        };
        
        try {
          const data = await apiFetch('/auth/register', {
            method: 'POST',
            body: JSON.stringify(payload)
          });

          if (data && data.token) {
            window.saveAuth(data, data.user);
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect');
            if (redirect) {
              window.location.href = redirect;
            } else {
              window.location.href = 'index.html';
            }
          } else {
            alert('Registration Failed: ' + (data.error || 'Please check your details.'));
            submitBtn.textContent = 'Sign Up';
            submitBtn.disabled = false;
          }
        } catch (err) {
          console.error(err);
          alert('Network Error: Failed to connect to the server.');
          submitBtn.textContent = 'Sign Up';
          submitBtn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
